<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych - Forgot Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8fbfd;
        }
        .container {
            width: 400px;
            background: #fff;
            padding: 24px 32px 32px;
            border-radius: 8px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h2 { color: #001e4d; margin-bottom: 8px; }
        p.subtitle { color: #666; font-size: 14px; margin-bottom: 20px; }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #015fff, #3b72d0);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: linear-gradient(90deg, #0148d4, #305fae); }
        .back-link {
            display: block;
            margin-top: 15px;
            color: #007bff;
            cursor: pointer;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .msg { margin-top: 14px; font-size: 14px; }
        .msg.success { color: #28a745; }
        .msg.error { color: #dc3545; }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(255,255,255,0.7);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 48px; height: 48px;
            border: 5px solid #e0e0e0; border-top: 5px solid #015fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            .container { width: 90%; padding: 20px 16px; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="container">
    <img src="/static/logo.png" alt="Logo" width="250" />
    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your email and we'll send you a reset link.</p>

    <form id="forgotForm" autocomplete="off">
        <input type="email" name="email" placeholder="Enter your email" required />
        <button type="submit">Send Reset Link</button>
    </form>

    <div class="msg" id="feedbackMsg"></div>

    {% if user_type == 'firm' %}
    <a href="/firm" class="back-link">Back to Firm Login</a>
    {% else %}
    <a href="/" class="back-link">Back to Login</a>
    {% endif %}
</div>

<script>
    var userType = "{{ user_type }}";
    var endpoint = userType === 'firm' ? '/firm/forgot-password' : '/auth/forgot-password';

    document.getElementById('forgotForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        var email = this.email.value.trim();
        if (!email) return;

        document.getElementById('loadingOverlay').classList.add('active');
        var msg = document.getElementById('feedbackMsg');
        msg.textContent = '';
        msg.className = 'msg';

        try {
            var res = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email })
            });
            var data = await res.json();
            msg.textContent = data.message;
            msg.className = 'msg success';
        } catch (err) {
            msg.textContent = 'Something went wrong. Please try again.';
            msg.className = 'msg error';
        }
        document.getElementById('loadingOverlay').classList.remove('active');
    });
</script>

</body>
</html>
