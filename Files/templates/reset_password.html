<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych - Reset Password</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8fbfd;
        }
        .container {
            width: 400px;
            background: #fff;
            padding: 24px 32px 32px;
            border-radius: 8px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            text-align: center;
        }
        h2 { color: #001e4d; margin-bottom: 8px; }
        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #015fff, #3b72d0);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: linear-gradient(90deg, #0148d4, #305fae); }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .back-link {
            display: block;
            margin-top: 15px;
            color: #007bff;
            cursor: pointer;
            text-decoration: none;
        }
        .back-link:hover { text-decoration: underline; }
        .msg { margin-top: 14px; font-size: 14px; }
        .msg.success { color: #28a745; }
        .msg.error { color: #dc3545; }
        .error-banner {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .password-requirements {
            text-align: left;
            font-size: 12px;
            color: #888;
            margin: 4px 0 10px;
            line-height: 1.6;
        }
        .password-requirements span.met { color: #28a745; }
        .password-requirements span.unmet { color: #ccc; }
        .loading-overlay {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(255,255,255,0.7);
            z-index: 9999; justify-content: center; align-items: center;
        }
        .loading-overlay.active { display: flex; }
        .spinner {
            width: 48px; height: 48px;
            border: 5px solid #e0e0e0; border-top: 5px solid #015fff;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @media (max-width: 480px) {
            .container { width: 90%; padding: 20px 16px; }
        }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="container">
    <img src="/static/logo.png" alt="Logo" width="250" />
    <h2>Reset Password</h2>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    {% if not error %}
    <form id="resetForm" autocomplete="off">
        <input type="password" id="newPassword" name="password" placeholder="New Password" required />
        <div class="password-requirements" id="pwReqs">
            <span id="req-len" class="unmet">&#x2022; 8+ characters</span><br/>
            <span id="req-up" class="unmet">&#x2022; Uppercase letter</span><br/>
            <span id="req-lo" class="unmet">&#x2022; Lowercase letter</span><br/>
            <span id="req-dig" class="unmet">&#x2022; Digit</span>
        </div>
        <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm Password" required />
        <div class="msg" id="matchMsg"></div>
        <button type="submit" id="submitBtn" disabled>Reset Password</button>
    </form>
    {% endif %}

    <div class="msg" id="feedbackMsg"></div>

    {% if user_type == 'firm' %}
    <a href="/firm" class="back-link">Back to Firm Login</a>
    {% else %}
    <a href="/" class="back-link">Back to Login</a>
    {% endif %}
</div>

<script>
    var userType = "{{ user_type }}";
    var token = "{{ token }}";
    var endpoint = userType === 'firm'
        ? '/firm/reset-password/' + token
        : '/auth/reset-password/' + token;

    var pwInput = document.getElementById('newPassword');
    var cpwInput = document.getElementById('confirmPassword');

    function checkReqs() {
        if (!pwInput) return;
        var pw = pwInput.value;
        var checks = {
            'req-len': pw.length >= 8,
            'req-up': /[A-Z]/.test(pw),
            'req-lo': /[a-z]/.test(pw),
            'req-dig': /[0-9]/.test(pw)
        };
        var allMet = true;
        for (var id in checks) {
            var el = document.getElementById(id);
            if (el) el.className = checks[id] ? 'met' : 'unmet';
            if (!checks[id]) allMet = false;
        }

        var match = pw && cpwInput.value && pw === cpwInput.value;
        var matchEl = document.getElementById('matchMsg');
        if (cpwInput.value) {
            matchEl.textContent = match ? 'Passwords match' : 'Passwords do not match';
            matchEl.className = 'msg ' + (match ? 'success' : 'error');
        } else {
            matchEl.textContent = '';
        }

        var btn = document.getElementById('submitBtn');
        if (btn) btn.disabled = !(allMet && match);
    }

    if (pwInput) pwInput.addEventListener('input', checkReqs);
    if (cpwInput) cpwInput.addEventListener('input', checkReqs);

    var form = document.getElementById('resetForm');
    if (form) {
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('loadingOverlay').classList.add('active');
            var msg = document.getElementById('feedbackMsg');
            msg.textContent = '';
            msg.className = 'msg';

            try {
                var res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwInput.value })
                });
                var data = await res.json();
                if (data.success) {
                    msg.textContent = data.message;
                    msg.className = 'msg success';
                    form.style.display = 'none';
                } else {
                    msg.textContent = data.message;
                    msg.className = 'msg error';
                }
            } catch (err) {
                msg.textContent = 'Something went wrong. Please try again.';
                msg.className = 'msg error';
            }
            document.getElementById('loadingOverlay').classList.remove('active');
        });
    }
</script>

</body>
</html>
