<!DOCTYPE html>
<html lang="en" class="page-reset-password">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych - Reset Password</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<div class="loading-overlay" id="loadingOverlay"><div class="spinner"></div></div>

<div class="container">
    <img src="/static/logo.png" alt="Logo" class="auth-logo" />
    <h2>Reset Password</h2>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    {% if not error %}
    <form id="resetForm" autocomplete="off">
        <input type="password" id="newPassword" name="password" placeholder="New Password" required />
        <div class="password-requirements" id="pwReqs">
            <span id="req-len" class="unmet">&#x2022; 8+ characters</span><br/>
            <span id="req-up" class="unmet">&#x2022; Uppercase letter</span><br/>
            <span id="req-lo" class="unmet">&#x2022; Lowercase letter</span><br/>
            <span id="req-dig" class="unmet">&#x2022; Digit</span>
        </div>
        <input type="password" id="confirmPassword" name="confirm_password" placeholder="Confirm Password" required />
        <div class="msg" id="matchMsg"></div>
        <button type="submit" id="submitBtn" disabled>Reset Password</button>
    </form>
    {% endif %}

    <div class="msg" id="feedbackMsg"></div>

    {% if user_type == 'firm' %}
    <a href="/firm" class="back-link">Back to Firm Login</a>
    {% else %}
    <a href="/" class="back-link">Back to Login</a>
    {% endif %}
</div>

<script>
    var userType = "{{ user_type }}";
    var token = "{{ token }}";
    var endpoint = userType === 'firm'
        ? '/firm/reset-password/' + token
        : '/auth/reset-password/' + token;

    var pwInput = document.getElementById('newPassword');
    var cpwInput = document.getElementById('confirmPassword');

    function checkReqs() {
        if (!pwInput) return;
        var pw = pwInput.value;
        var checks = {
            'req-len': pw.length >= 8,
            'req-up': /[A-Z]/.test(pw),
            'req-lo': /[a-z]/.test(pw),
            'req-dig': /[0-9]/.test(pw)
        };
        var allMet = true;
        for (var id in checks) {
            var el = document.getElementById(id);
            if (el) el.className = checks[id] ? 'met' : 'unmet';
            if (!checks[id]) allMet = false;
        }

        var match = pw && cpwInput.value && pw === cpwInput.value;
        var matchEl = document.getElementById('matchMsg');
        if (cpwInput.value) {
            matchEl.textContent = match ? 'Passwords match' : 'Passwords do not match';
            matchEl.className = 'msg ' + (match ? 'success' : 'error');
        } else {
            matchEl.textContent = '';
        }

        var btn = document.getElementById('submitBtn');
        if (btn) btn.disabled = !(allMet && match);
    }

    if (pwInput) pwInput.addEventListener('input', checkReqs);
    if (cpwInput) cpwInput.addEventListener('input', checkReqs);

    var form = document.getElementById('resetForm');
    if (form) {
        form.addEventListener('submit', async function(e) {
            e.preventDefault();
            document.getElementById('loadingOverlay').classList.add('active');
            var msg = document.getElementById('feedbackMsg');
            msg.textContent = '';
            msg.className = 'msg';

            try {
                var res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: pwInput.value })
                });
                var data = await res.json();
                if (data.success) {
                    msg.textContent = data.message;
                    msg.className = 'msg success';
                    form.style.display = 'none';
                } else {
                    msg.textContent = data.message;
                    msg.className = 'msg error';
                }
            } catch (err) {
                msg.textContent = 'Something went wrong. Please try again.';
                msg.className = 'msg error';
            }
            document.getElementById('loadingOverlay').classList.remove('active');
        });
    }
</script>

</body>
</html>
