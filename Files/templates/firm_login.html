<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych Firm-Login</title>
    <style>
        /* ===== Core Layout ===== */
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8fbfd;
        }

        .container {
            width: 400px;
            background: #fff;
            padding: 24px 32px 32px;
            border-radius: 8px;
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        /* ===== Form Elements ===== */
        form {
            margin-top: 8px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
            box-sizing: border-box;
            transition: background-color 0.3s ease;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #015fff, #3b72d0);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.25s ease;
        }

        button:hover {
            background: linear-gradient(90deg, #0148d4, #305fae);
        }

        input:focus {
            outline: none;
            border-color: #E8F0FE;
            box-shadow: none;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            color: #007bff;
            cursor: pointer;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        /* Loading Spinner */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
        }
        .loading-overlay.active {
            display: flex;
        }
        .spinner {
            width: 48px; height: 48px;
            border: 5px solid #e0e0e0;
            border-top: 5px solid #015fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Mobile Responsiveness */
        @media (max-width: 480px) {
            .container {
                width: 90%;
                padding: 20px 16px;
            }
            .container img {
                width: 180px;
            }
            h2 {
                font-size: 20px;
            }
            input {
                font-size: 14px;
                padding: 10px;
            }
            button {
                font-size: 14px;
                padding: 10px;
            }
        }
        @media (max-width: 768px) and (min-width: 481px) {
            .container {
                width: 80%;
                max-width: 450px;
            }
        }
    </style>
</head>
<body>

<!-- Loading Spinner Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<div class="container">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" width="250" />
    <h2>Firm Login</h2>

    <form id="firmLoginForm" autocomplete="off">
        <input type="email" name="email" placeholder="Enter Firm Email" required />
        <input type="password" name="password" placeholder="Enter Password" required />
        <button type="submit">Login</button>
    </form>
    <a href="/firm/forgot-password" class="back-link" style="margin-top:10px;">Forgot Password?</a>
    <a href="/" class="back-link">Back to Student Portal</a>
</div>

<script src="/static/js/jwt_helpers.js"></script>
<script src="/static/js/toast.js"></script>
<script>
    // ================= Firm Login =================
    document.getElementById('firmLoginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email = this.email.value.trim();
        const password = this.password.value;

        if (!email || !password) {
            showToast('Please fill in both fields.', 'warning');
            return;
        }

        document.getElementById('loadingOverlay').classList.add('active');

        try {
            const res = await authFetch('/api/v1/firm/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.status === 429) {
                showToast('Too many attempts. Please wait 1 minute.', 'warning');
                document.getElementById('loadingOverlay').classList.remove('active');
                return;
            }

            const data = await res.json();
            if (data.success) {
                window.location.href = '/firm/dashboard';
            } else {
                showToast(data.message || 'Invalid firm credentials', 'error');
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        } catch (err) {
            console.error('Login error:', err);
            showToast('Something went wrong. Please try again.', 'error');
            document.getElementById('loadingOverlay').classList.remove('active');
        }
    });

    // ====== Input Background Color Change on Focus or Filled ======
    const emailInput = document.querySelector('input[name="email"]');
    const passwordInput = document.querySelector('input[name="password"]');

    emailInput.addEventListener('focus', () => updateInputBackground(emailInput));
    emailInput.addEventListener('blur', () => updateInputBackground(emailInput));

    passwordInput.addEventListener('focus', () => updateInputBackground(passwordInput));
    passwordInput.addEventListener('blur', () => updateInputBackground(passwordInput));

    window.addEventListener('DOMContentLoaded', () => {
        updateInputBackground(emailInput);
        updateInputBackground(passwordInput);
    });

    function updateInputBackground(inputElem) {
        if (inputElem === document.activeElement || inputElem.value.trim() !== "") {
            inputElem.style.backgroundColor = "#E1EAFA";
        } else {
            inputElem.style.backgroundColor = "";
        }
    }
</script>

</body>
</html>
