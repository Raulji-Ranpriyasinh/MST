<!DOCTYPE html>
<html lang="en" class="page-firm-login">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych Firm-Login</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<!-- Loading Spinner Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<div class="container">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="auth-logo" />
    <h2>Firm Login</h2>

    <form id="firmLoginForm" autocomplete="off">
        <input type="email" name="email" placeholder="Enter Firm Email" required />
        <input type="password" name="password" placeholder="Enter Password" required />
        <button type="submit">Login</button>
    </form>
    <a href="/firm/forgot-password" class="back-link" style="margin-top:10px;">Forgot Password?</a>
    <a href="/" class="back-link">Back to Student Portal</a>
</div>

<script src="/static/js/jwt_helpers.js"></script>
<script src="/static/js/toast.js"></script>
<script>
    // ================= Firm Login =================
    document.getElementById('firmLoginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const email = this.email.value.trim();
        const password = this.password.value;

        if (!email || !password) {
            showToast('Please fill in both fields.', 'warning');
            return;
        }

        document.getElementById('loadingOverlay').classList.add('active');

        try {
            const res = await authFetch('/api/v1/firm/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.status === 429) {
                showToast('Too many attempts. Please wait 1 minute.', 'warning');
                document.getElementById('loadingOverlay').classList.remove('active');
                return;
            }

            const data = await res.json();
            if (data.success) {
                window.location.href = '/firm/dashboard';
            } else {
                showToast(data.message || 'Invalid firm credentials', 'error');
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        } catch (err) {
            console.error('Login error:', err);
            showToast('Something went wrong. Please try again.', 'error');
            document.getElementById('loadingOverlay').classList.remove('active');
        }
    });

    // ====== Input Background Color Change on Focus or Filled ======
    const emailInput = document.querySelector('input[name="email"]');
    const passwordInput = document.querySelector('input[name="password"]');

    emailInput.addEventListener('focus', () => updateInputBackground(emailInput));
    emailInput.addEventListener('blur', () => updateInputBackground(emailInput));

    passwordInput.addEventListener('focus', () => updateInputBackground(passwordInput));
    passwordInput.addEventListener('blur', () => updateInputBackground(passwordInput));

    window.addEventListener('DOMContentLoaded', () => {
        updateInputBackground(emailInput);
        updateInputBackground(passwordInput);
    });

    function updateInputBackground(inputElem) {
        if (inputElem === document.activeElement || inputElem.value.trim() !== "") {
            inputElem.style.backgroundColor = "#E1EAFA";
        } else {
            inputElem.style.backgroundColor = "";
        }
    }
</script>

</body>
</html>
