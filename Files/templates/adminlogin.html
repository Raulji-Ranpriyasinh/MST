<!DOCTYPE html>
<html lang="en" class="page-admin-login">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych Admin-Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<!-- Loading Spinner Overlay -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
</div>

<div class="container">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="auth-logo" />
    <h2>Admin Login</h2>

    <form id="adminLoginForm" autocomplete="off">
        <label for="adminUsername" class="sr-only">Admin Username</label>
        <input type="text" id="adminUsername" name="username" placeholder="Enter Admin Username" required aria-label="Admin Username" />
        <label for="adminPassword" class="sr-only">Password</label>
        <input type="password" id="adminPassword" name="password" placeholder="Enter Password" required aria-label="Password" />
        <button type="submit">Login</button>
    </form>
</div>

<script src="/static/js/jwt_helpers.js"></script>
<script src="/static/js/toast.js"></script>
<script>
    // ================= Admin Login =================
    document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
        e.preventDefault();

        const username = this.username.value.trim();
        const password = this.password.value;

        document.getElementById('loadingOverlay').classList.add('active');

        try {  
            const res = await authFetch('/admin_login', {  
                method: 'POST',  
                headers: { 'Content-Type': 'application/json' },  
                body: JSON.stringify({ username, password })  
            });  
        
            // NEW: detect rate limit  
            if (res.status === 429) {  
                showToast('Too many attempts. Please wait 1 minute.');  
                document.getElementById('loadingOverlay').classList.remove('active');
                return;  
            }  
        
            const data = await res.json();  
            if (data.success) {  
                window.location.href = '/admin_dashboard';  
            } else {  
                showToast('Invalid admin credentials', 'error');  
                document.getElementById('loadingOverlay').classList.remove('active');
            }  
        } catch (err) {  
            console.error('Login error:', err);  
            showToast('Something went wrong. Please try again.', 'error');  
            document.getElementById('loadingOverlay').classList.remove('active');
        }
    });

    // ====== Input Background Color Change on Focus or Filled ======
    const usernameInput = document.querySelector('input[name="username"]');
    const passwordInput = document.querySelector('input[name="password"]');

    usernameInput.addEventListener('focus', () => updateInputBackground(usernameInput));
    usernameInput.addEventListener('blur', () => updateInputBackground(usernameInput));

    passwordInput.addEventListener('focus', () => updateInputBackground(passwordInput));
    passwordInput.addEventListener('blur', () => updateInputBackground(passwordInput));

    // Initialize background on page load if inputs are filled (optional)
    window.addEventListener('DOMContentLoaded', () => {
        updateInputBackground(usernameInput);
        updateInputBackground(passwordInput);
    });

    function updateInputBackground(inputElem) {
        if (inputElem === document.activeElement || inputElem.value.trim() !== "") {
            inputElem.classList.add('input-filled');
        } else {
            inputElem.classList.remove('input-filled');
        }
    }

</script>

</body>
</html>
