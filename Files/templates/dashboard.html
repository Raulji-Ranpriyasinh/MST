<!DOCTYPE html>
<html lang="en" class="page-dashboard">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych Dashboard</title>

    <!-- ✅ Add Google Font (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

    <!-- Loading Spinner Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="navbar">
        <div class="logo">
            <img src="/static/image-removebg edge.png" class="logo-icon" alt="logo" />
            <!-- <img src="/static/nav-img1.png" class="nav-img" alt="Image 1" />
      <img src="/static/nav-img2.png" class="nav-img" alt="Image 2" /> -->
        </div>
        <div class="dropdown">
            <button onclick="toggleDropdown()" class="profile-btn">
                <span class="user-icon"><img src="/static/profile-icon.png" alt=""></span> {{ first_name }} ▼
            </button>
            <div class="dropdown-content" id="dropdownMenu">
                <p>ID: {{ user_id }}</p>
                <p>{{ email }}</p>
                <a href="#" onclick="jwtLogout('/logout'); return false;">Logout</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>Dashboard</h2>
        <div class="grid">
            <div class="card card-clickable" onclick="window.location.href='/programmes';">
                <img src="/static/programmersimg.png" alt="">
                <h3>Programmes</h3>
                <p>Take the questionnaire/tests, view results and feedback.</p>
            </div>

            <!-- <div class="card">
        <h3>Resources</h3>
        <p>Documentation to view or download.</p>
      </div>
      <div class="card">
        <h3>Tasks</h3>
        <p>View tasks assigned to you.</p>
      </div>
      <div class="card">
        <h3>Experiences</h3>
        <p>Record skills developed for future applications.</p>
      </div>
       -->
        </div>
    </div>

    <script src="/static/js/jwt_helpers.js"></script>
    <script>
        function toggleDropdown() {
            var dropdown = document.getElementById("dropdownMenu");
            dropdown.style.display = (dropdown.style.display === "block") ? "none" : "block";
        }

        document.addEventListener("click", function (event) {
            var dropdown = document.getElementById("dropdownMenu");
            var button = document.querySelector(".profile-btn");
            if (!button.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.style.display = "none";
            }
        });
    </script>
</body>

</html>
