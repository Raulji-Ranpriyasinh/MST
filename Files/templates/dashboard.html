<!DOCTYPE html>
<html lang="en" class="page-dashboard">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>

    <!-- Loading Spinner Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="navbar">
        <div class="logo">
            <img src="/static/image-removebg edge.png" class="logo-icon" alt="logo" />
            <!-- <img src="/static/nav-img1.png" class="nav-img" alt="Image 1" />
      <img src="/static/nav-img2.png" class="nav-img" alt="Image 2" /> -->
        </div>
        <div class="dropdown">
            <button onclick="toggleDropdown()" class="profile-btn">
                <span class="user-icon"><img src="/static/profile-icon.png" alt=""></span> {{ first_name }} ▼
            </button>
            <div class="dropdown-content" id="dropdownMenu">
                <p>ID: {{ user_id }}</p>
                <p>{{ email }}</p>
                <a href="#" onclick="jwtLogout('/logout'); return false;">Logout</a>
            </div>
        </div>
    </div>

    <!-- Breadcrumb Navigation -->
    <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/dashboard">Home</a>
        <span class="breadcrumb-separator">/</span>
        <span class="breadcrumb-current">Dashboard</span>
    </nav>

    <div class="container">
        <h2>Dashboard</h2>
        <div class="grid">
            <div class="card card-clickable" onclick="window.location.href='/programmes';">
                <img src="/static/programmersimg.png" alt="Programmes">
                <h3>Programmes</h3>
                <p>Take the questionnaire/tests, view results and feedback.</p>
            </div>
        </div>

        <!-- Empty state for when no programmes are available -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <p>No programmes available yet. Check back later.</p>
        </div>
    </div>

    <footer class="page-footer">
        &copy; 2025 Edgepsych. All rights reserved.
    </footer>

    <script src="/static/js/jwt_helpers.js"></script>
    <script>
        function toggleDropdown() {
            var dropdown = document.getElementById("dropdownMenu");
            dropdown.style.display = (dropdown.style.display === "block") ? "none" : "block";
        }

        document.addEventListener("click", function (event) {
            var dropdown = document.getElementById("dropdownMenu");
            var button = document.querySelector(".profile-btn");
            if (!button.contains(event.target) && !dropdown.contains(event.target)) {
                dropdown.style.display = "none";
            }
        });
    </script>
</body>

</html>
