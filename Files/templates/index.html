<!DOCTYPE html>
<html lang="en" class="page-index">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="/static/favicon.png">
  <title>Edgepsych Student-Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/styles.css">
</head>

<body>
  <!-- Loading Spinner Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
  </div>

  <div class="container">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" class="auth-logo" />
    <h2 id="formTitle">Register</h2>

    <!-- Login Form -->
    <div id="studentForm" class="hidden">
      <label for="studentEmail" class="sr-only">Student Email</label>
      <input type="email" id="studentEmail" placeholder="Enter Student Email" required aria-label="Student Email" />
      <label for="studentPassword" class="sr-only">Password</label>
      <input type="password" id="studentPassword" placeholder="Enter Password" required aria-label="Password" />
      <button onclick="loginStudent()">Log in</button>
      <a href="/auth/forgot-password" class="toggle-link" style="margin-top:8px;font-size:14px;">Forgot Password?</a>
      <span class="toggle-link" onclick="toggleForms()">Don't have an account? Register here</span>
    </div>

    <!-- Register Form -->
    <div id="registerForm">
      <form onsubmit="return registerStudent(event)">
        <label for="first_name" class="sr-only">First Name</label>
        <input type="text" id="first_name" placeholder="First Name *" required aria-label="First Name" />
        <label for="last_name" class="sr-only">Last Name</label>
        <input type="text" id="last_name" placeholder="Last Name *" required aria-label="Last Name" />
        <label for="email" class="sr-only">Email</label>
        <input type="email" id="email" placeholder="Email *" required aria-label="Email" />
        <label for="mobile_number" class="sr-only">Mobile Number</label>
        <input type="text" id="mobile_number" placeholder="10-digit Mobile Number *" required maxlength="10" aria-label="Mobile Number" />
        <label for="country" class="sr-only">Country</label>
        <input type="text" id="country" placeholder="Country *" required aria-label="Country" />

        <select id="curriculum" required>
          <option value="">Select Curriculum *</option>
          <option value="IB">IB</option>
          <option value="Cambridge">Cambridge</option>
          <option value="American">American</option>
          <option value="Other">Other</option>
        </select>

        <input type="text" id="school_name" placeholder="School Name *" required />

        <select id="grade" required>
          <option value="">Grade *</option>
          <option value="VIII/Year-09">VIII/Year-09</option>
          <option value="IX/Year-10/Freshmen">IX/Year-10/Freshmen</option>
          <option value="X/Year-11/Sophomore">X/Year-11/Sophomore</option>
          <option value="XI/Year-12/Jr. High">XI/Year-12/Jr. High</option>
          <option value="XII/Year-13/High">XII/Year-13/High</option>
        </select>

        <select id="referral_source" required>
          <option value="">How did you know about us? *</option>
          <option value="Social Media">Social Media</option>
          <option value="Friends/Family">Friends/Family</option>
          <option value="Advertisements">Advertisements</option>
        </select>

        {% if firm_token %}
        <input type="hidden" id="firm_token" name="firm_token" value="{{ firm_token }}" />
        <div id="firmBadge" class="firm-badge">
          Registering with firm: <strong>{{ firm_name }}</strong>
        </div>
        {% else %}
        <select id="firm_id" style="display:none;">
          <option value="">Consultancy Firm (Optional)</option>
        </select>
        {% endif %}

        <label for="password" class="sr-only">Password</label>
        <input type="password" id="password" placeholder="Password *" required aria-label="Password" />
        <label for="confirmPassword" class="sr-only">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Confirm Password *" required aria-label="Confirm Password" />

        <button class="register" type="submit">Register</button>
        <span class="toggle-link" onclick="toggleForms()">Already registered? Login here</span>
      </form>
    </div>
    <div class="auth-footer-link">
      <a href="/firm">Firm Login &rarr;</a>
    </div>
  </div>

  <script src="/static/js/jwt_helpers.js"></script>
  <script src="/static/js/toast.js"></script>
  <script>
    if (window.history && window.history.replaceState) {  
    window.history.replaceState(null, "", window.location.href);  
}
    function toggleForms() {
      const studentForm = document.getElementById("studentForm");
      const registerForm = document.getElementById("registerForm");
      const formTitle = document.getElementById("formTitle");

      if (registerForm.classList.contains("hidden")) {
        registerForm.classList.remove("hidden");
        studentForm.classList.add("hidden");
        formTitle.textContent = "Register";
      } else {
        registerForm.classList.add("hidden");
        studentForm.classList.remove("hidden");
        formTitle.textContent = "Login";
      }
    }

    function loginStudent() {
      const email = document.getElementById("studentEmail").value.trim().toLowerCase();
      const password = document.getElementById("studentPassword").value;

      if (!email || !password) {
        showToast("Please fill in both fields.", "warning");
        return;
      }

      document.getElementById('loadingOverlay').classList.add('active');

      authFetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      })
        .then(response => response.json())
        .then(data => {
          if (data.success) {
            window.location.href = "/dashboard";
          } else {
            showToast("Invalid credentials", "error");
            document.getElementById('loadingOverlay').classList.remove('active');
          }
        })
        .catch(error => {
          console.error("Error:", error);
          document.getElementById('loadingOverlay').classList.remove('active');
        });
    }

    function registerStudent(event) {
      event.preventDefault();

      const password = document.getElementById("password").value;
      const confirmPassword = document.getElementById("confirmPassword").value;
      const mobile = document.getElementById("mobile_number").value;

      if (password !== confirmPassword) {
        showToast("Passwords do not match.", "warning");
        return false;
      }

      if (mobile.length !== 10) {
        showToast("Mobile number must be exactly 10 digits.", "warning");
        return false;
      }

      const data = {
        first_name: document.getElementById("first_name").value.trim(),
        last_name: document.getElementById("last_name").value.trim(),
        email: document.getElementById("email").value.trim().toLowerCase(),
        mobile_number: mobile,
        country: document.getElementById("country").value.trim(),
        curriculum: document.getElementById("curriculum").value,
        school_name: document.getElementById("school_name").value.trim(),
        grade: document.getElementById("grade").value,
        referral_source: document.getElementById("referral_source").value,
        password: password
      };

      // Invite-link flow: send the token instead of firm_id
      const firmTokenEl = document.getElementById("firm_token");
      if (firmTokenEl) {
        data.firm_token = firmTokenEl.value;
      } else {
        const firmSelect = document.getElementById("firm_id");
        if (firmSelect && firmSelect.value) {
          data.firm_id = parseInt(firmSelect.value);
        }
      }

      document.getElementById('loadingOverlay').classList.add('active');

      authFetch("/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
      })
        .then(response => response.json())
        .then(result => {
          if (result.success) {
            showToast("Registration successful! Logging in...", "success");
            window.location.href = "/dashboard";
          } else {
            showToast(result.message || "Registration failed.", "error");
            document.getElementById('loadingOverlay').classList.remove('active');
          }
        })
        .catch(error => {
          console.error("Error:", error);
          showToast("An error occurred.", "error");
          document.getElementById('loadingOverlay').classList.remove('active');
        });

      return false;
    }

    // Capitalize first letter
function formatNameField(id) {
  const input = document.getElementById(id);
  
  input.addEventListener("blur", () => {
    const val = input.value.trim();
    if (val.length > 0) {
      input.value = val
        .split(" ")
        .filter(word => word.length > 0) // remove extra spaces
        .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
        .join(" ");
    }
  });
}


    // Firms dropdown is no longer publicly loaded.
    // Students register via invite links generated by admins.

    formatNameField("first_name");
    formatNameField("last_name");
    formatNameField("country");
    formatNameField("school_name");

    document.getElementById("email").addEventListener("input", function () {
      this.value = this.value.toLowerCase();
    });

    document.getElementById("mobile_number").addEventListener("input", function () {
      this.value = this.value.replace(/\D/g, '').slice(0, 10);
    });

    const inputs = document.querySelectorAll("input");
    inputs.forEach((input) => {
      input.addEventListener("focus", () => updateInputBackground(input));
      input.addEventListener("blur", () => updateInputBackground(input));
    });

    function updateInputBackground(inputElem) {
      if (inputElem === document.activeElement || inputElem.value.trim() !== "") {
        inputElem.classList.add('input-filled');
      } else {
        inputElem.classList.remove('input-filled');
      }
    }

    // Default to login for returning users (Intern 13)
    if (localStorage.getItem('hasRegistered')) {
      toggleForms();
    }
    // Mark as registered after successful registration
    var origRegister = registerStudent;
    // Set flag on successful login too
    document.getElementById('studentEmail').closest('#studentForm') && localStorage.setItem('hasLoggedIn', 'true');
  </script>
</body>

</html>
