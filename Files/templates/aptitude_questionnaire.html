    const category = categories[currentCategoryIndex];

    // Use label instead of raw category name
    document.getElementById("modal-category-name").innerText = categoryInfo?.label || category;

    // Set image if available
    if (categoryImage) {
        document.getElementById("modal-category-image").src = categoryImage;
        document.getElementById("modal-category-image").style.display = "block";
    } else {
        document.getElementById("modal-category-image").style.display = "none";
    }

    // ✅ Show modal
    document.getElementById("category-modal").style.display = "block";

    // ✅ Attach handler to OK button

    startButton.onclick = function () {
        document.getElementById("category-modal").style.display = "none";
        currentQuestionIndex = 0;
        loadNextQuestion();
        startTimer();
        renderQuestionTiles();
    };
}

  },

    instruction: "For abstract reasoning, select the option that logically completes the given series or pattern."
  },
  NUMEBERS: {

    instruction: "For numbers, perform the necessary calculation and choose the correct answer."
  },
  Verbal: {
    label: "Verbal Reasoning",
    instruction: "For verbal reasoning, choose the answer that best completes the sentence or solves the problem."
  },
  arithmetic: {

    instruction: "In the arithmetic category, solve the math problem and pick the correct option."

        const categoryImages = { spellingmistake: "/static/spellingmistake.png", ABSTRACT: "/static/abstract.png", NUMEBERS: "/static/numbers.png", Verbal: "/static/verbal.png", arithmetic: "/static/arithmetic.png", workingQA: "/static/workingqa.png", SPATIAL: "/static/spatial.png" };
// changed for loop hole

function preloadNextImages(category, nextIndex) {
    let questions = questionsByCategory[category];
    if (!questions || nextIndex >= questions.length) return;

    const nextQuestion = questions[nextIndex];

    // Preload question image
    if (nextQuestion.question_image_url) {
        const img = new Image();
        img.src = nextQuestion.question_image_url;
    }

    // Preload option images
    ["a", "b", "c", "d"].forEach(option => {
        const url = nextQuestion[`option_${option}_image_url`];
        if (url) {
            const img = new Image();
            img.src = url;
        }
    });
}


function loadNextQuestion() {
    if (isQuestionLoading) return;
    isQuestionLoading = true;

    if (currentCategoryIndex >= categories.length) {
        
        return;
    }

    let category = categories[currentCategoryIndex];
    let questions = questionsByCategory[category];
    let totalQuestions = questions.length;

    // 🕓 Start timer only when user starts category
    //if (currentQuestionIndex === 0) startTimer();

    // ✅ Check if user is trying to move past the last question
    if (currentQuestionIndex >= totalQuestions) {
        // 🚫 Prevent category switch if there are unanswered questions
        const unanswered = questions.filter(q => !(q.id in userResponses));
        if (unanswered.length > 0) {
            showToast("Please answer all questions before moving to the next category.", "warning");
            // 🔁 Jump to first unanswered question
            currentQuestionIndex = questions.findIndex(q => !(q.id in userResponses));
            loadQuestionById(questions[currentQuestionIndex].id);
            isQuestionLoading = false;
            return;
        }

        // ✅ All questions answered — move to next category
        currentCategoryIndex++;
        currentQuestionIndex = 0;
        updateCategoryButtonsUI();
        showCategoryModal();
        isQuestionLoading = false;
        return;
    }

    let question = questions[currentQuestionIndex];

    document.getElementById("category-name").innerText = "Category: " + question.category;
    document.getElementById("question-counter").innerText = `Question ${currentQuestionIndex + 1} of ${totalQuestions}`;
    document.getElementById("question-id").value = question.id;

    const imagesToLoad = [];
    const questionImage = document.getElementById("question-image");
    const questionText = document.getElementById("question-text");

    if (question.question_image_url) {
        questionImage.onload = questionImage.onerror = () => checkAllLoaded();
        questionImage.src = question.question_image_url;
        questionImage.style.display = "block";
        imagesToLoad.push(questionImage);
    } else {
        questionImage.style.display = "none";
    }

    questionText.innerText = question.question_text || "";
    questionText.style.display = question.question_text ? "block" : "none";

    ["a", "b", "c", "d"].forEach(option => {
        const optionImg = document.getElementById(`option-${option}`);
        const optionText = document.getElementById(`option-${option}-text`);

        if (question[`option_${option}_image_url`]) {
            optionImg.onload = optionImg.onerror = () => checkAllLoaded();
            optionImg.src = question[`option_${option}_image_url`];
            optionImg.style.display = "block";
            imagesToLoad.push(optionImg);
        } else {
            optionImg.style.display = "none";
        }

        if (question[`option_${option}_text`]) {
            optionText.innerText = question[`option_${option}_text`];
            optionText.style.display = "block";
        } else {
            optionText.style.display = "none";
        }

        optionImg.classList.remove("selected-option");
        optionText.classList.remove("selected-option");

        let selected = userResponses[question.id];
        if (selected && selected.toLowerCase() === option) {
            optionImg.classList.add("selected-option");
            optionText.classList.add("selected-option");
        }

        optionImg.onclick = () => { if (!isQuestionLoading) selectOption(option.toUpperCase()); };
        optionText.onclick = () => { if (!isQuestionLoading) selectOption(option.toUpperCase()); };
    });

    let loaded = 0;
    function checkAllLoaded() {
        loaded++;
        if (loaded >= imagesToLoad.length) {
            isQuestionLoading = false;
            renderQuestionTiles();
        }
    }

    if (imagesToLoad.length === 0) {
        isQuestionLoading = false;
        renderQuestionTiles();
    }
    preloadNextImages(category, currentQuestionIndex + 1);
}

        function updateCategoryButtonsUI() {
            // Get all the category buttons
            const container = document.getElementById("category-selection");
            const buttons = container.getElementsByClassName("category-button");

            // Loop through all category buttons
            Array.from(buttons).forEach((button, index) => {
                // Reset styles for all categories
                button.classList.remove("active-category");
                button.classList.remove("completed-category");

                // Highlight the active category
                if (index === currentCategoryIndex) {
                    button.classList.add("active-category"); // Active category styling
                }

                // Darken completed categories (categories before the active one)
                if (index < currentCategoryIndex) {
                    button.classList.add("completed-category"); // Completed category styling
                }
            });
        }

function startCategoryTimer() {
    if (categoryTimer) clearInterval(categoryTimer);
    timeLeft = 10; // use 10 sec temporarily for quick test

    categoryTimer = setInterval(() => {
        document.getElementById("timer-display").innerText = `Time Left: ${timeLeft}s`;
        timeLeft--;

        if (timeLeft < 0) {
            clearInterval(categoryTimer);

            const categoryToSubmit = categories[currentCategoryIndex];
            console.log("🕐 Time is up! Submitting category:", categoryToSubmit);

            // Try forcing submit
            try {
                submitCategoryResponses(categoryToSubmit);
                console.log("📤 Called submitCategoryResponses inside timeout");
            } catch (err) {
                console.error("❌ Error calling submitCategoryResponses:", err);
            }

            setTimeout(() => {
                if (currentCategoryIndex < categories.length - 1) {
                    currentCategoryIndex++;
                    currentQuestionIndex = 0;

                    console.log("➡️ Moving to next category:", categories[currentCategoryIndex]);

                    updateCategoryButtonsUI();
                    showCategoryModal();
                    renderQuestionTiles();
                } else {
                    showToast("All categories completed!", "success");
                    window.location.href = '/programmes';
                }
            }, 300);
        }
    }, 1000);
}





        
        function moveToNextCategory() {
            if (currentCategoryIndex < categories.length - 1) {
                currentCategoryIndex++;
                currentQuestionIndex = 0; // Reset to first question of new category
                showCategoryModal();
                //startCategoryTimer(); // ✅ Restart timer for new category
            } else {
                submitFinalResponses(); // ✅ Auto-submit if last category
            }
        }
        function loadCategory() {
            let currentCategory = categories[currentCategoryIndex];
            let questions = questionsByCategory[currentCategory] || [];

            if (questions.length === 0) {
                console.warn(`⚠️ No questions found for category: ${currentCategory}`);
                return;
            }

            currentQuestionIndex = 0; // Start from first question
            loadQuestionById(questions[currentQuestionIndex]?.id);

            console.log(`🔄 Switched to Category: ${currentCategory}`);

            renderQuestionTiles();
            //startCategoryTimer(); // ✅ Reset the timer when switching categories
        }

        function nextQuestion() {
            let currentCategory = categories[currentCategoryIndex];
            let questions = questionsByCategory[currentCategory] || [];

            if (questions.length === 0) {
                console.warn(`⚠️ No questions found for category: ${currentCategory}`);
                return;
            }

            let currentQuestionId = questions[currentQuestionIndex]?.id;

            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++; // ✅ Move to next question in the same category
            } else {
                showToast("You cannot move to the next category manually. Please wait for the timer to end.", "warning");
                return; // ❌ Stop users from moving to the next category manually
            }

            let nextQuestionId = questions[currentQuestionIndex]?.id;
            console.log(`➡️ Moving from Question ID ${currentQuestionId} to ${nextQuestionId}`);

            loadQuestionById(nextQuestionId);
        }
        function previousQuestion() {
            let currentCategory = categories[currentCategoryIndex];
            let questions = questionsByCategory[currentCategory] || [];

            if (questions.length === 0) {
                console.warn(`⚠️ No questions found for category: ${currentCategory}`);
                return;
            }

            let currentQuestionId = questions[currentQuestionIndex]?.id;

            if (currentQuestionIndex > 0) {
                currentQuestionIndex--; // ✅ Move to the previous question in the same category
            } else {
                showToast("You cannot go back to the previous category.", "warning");
                return; // ❌ Restrict moving to the previous category
            }

            let prevQuestionId = questions[currentQuestionIndex]?.id;
            console.log(`⬅️ Moving from Question ID ${currentQuestionId} to ${prevQuestionId}`);

            loadQuestionById(prevQuestionId);
        }

function submitCategoryResponses(category) {
    console.log("📥 submitCategoryResponses triggered for category:", category);
    const categoryQuestions = questionsByCategory[category];
    const categoryResponses = {};

    categoryQuestions.forEach(q => {
        const selected = userResponses.hasOwnProperty(q.id) ? userResponses[q.id] : "0";
        categoryResponses[q.id] = selected;
    });

    return authFetch('/submit_category_responses', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
            category: category,
            responses: categoryResponses
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log('✅ Backend responded:', data);
        // Trust backend completion flag instead of local JS count
        if (!data.success) {
            showToast("Error saving responses: " + data.message, "error");
        }
        if (data.complete === false) {
            console.warn(`⚠️ Category ${category} incomplete: answered ${data.answered}/${data.expected}`);
        }
        return data;
    })
    .catch(error => console.error("Error submitting category responses:", error));
}



        function loadQuestionById(questionId) {
            let currentCategory = categories[currentCategoryIndex];
            let questions = questionsByCategory[currentCategory] || [];
            let questionFound = questions.find(q => q.id === questionId);

            if (!questionFound) {
                console.warn(`❌ Question ID ${questionId} not found!`);
                return;
            }

            let totalQuestions = questions.length;

            // ✅ Update Question Text and Category
            document.getElementById("category-name").innerText = "Category: " + questionFound.category;
            document.getElementById("question-text").innerText = questionFound.question_text || "";
            document.getElementById("question-id").value = questionFound.id;
            document.getElementById("question-counter").innerText = `Question ${currentQuestionIndex + 1} of ${totalQuestions}`;

            // ✅ Handle Image Questions (Show/Hide)
            let questionImage = document.getElementById("question-image");
            //changesd on 2-6 for img prob
            if (questionFound.question_image_url) {
                questionImage.src = questionFound.question_image_url;
                questionImage.style.display = "block";
            } else {
                questionImage.style.display = "none";
                questionImage.src = "";
            }



            // ✅ Update Options (Text + Image Support)
            ["a", "b", "c", "d"].forEach(option => {
                let optionImg = document.getElementById(`option-${option}`);
                let optionText = document.getElementById(`option-${option}-text`);

                if (questionFound[`option_${option}_image_url`]) {
                    optionImg.src = questionFound[`option_${option}_image_url`];
                    optionImg.style.display = "block";
                } else {
                    optionImg.style.display = "none";
                }

                if (questionFound[`option_${option}_text`]) {
                    optionText.innerText = questionFound[`option_${option}_text`];
                    optionText.style.display = "block";
                } else {
                    optionText.style.display = "none";
                }

                // ✅ Remove previous selection highlights
                optionImg.classList.remove("selected-option");
                optionText.classList.remove("selected-option");

                // ✅ Restore previously selected option
                let previousSelection = userResponses[questionFound.id];
                if (previousSelection && previousSelection.toUpperCase() === option.toUpperCase()) {
                    optionImg.classList.add("selected-option");
                    optionText.classList.add("selected-option");
                }

                // ✅ Attach event listeners to allow selection
                optionImg.onclick = () => selectOption(option.toUpperCase());
                optionText.onclick = () => selectOption(option.toUpperCase());
            });

            console.log(`✅ Loaded Question ID: ${questionFound.id} (Previous Answer: ${userResponses[questionFound.id] || "None"})`);
            renderQuestionTiles();

        }

        let ctrlPressed = false;

        // Detect when Ctrl is pressed
        document.addEventListener("keydown", (event) => {
            if (event.ctrlKey) {
                ctrlPressed = true;
            }
        });

        // Detect when Ctrl is released
        document.addEventListener("keyup", (event) => {
            if (event.key === "Control") {
                ctrlPressed = false;
            }
        });

        // Apply the enlarge effect when hovering over an image with Ctrl pressed
        document.querySelectorAll(".option-img").forEach((img) => {
            img.addEventListener("mouseenter", () => {
                if (ctrlPressed) {
                    img.classList.add("enlarge");
                }
            });

            img.addEventListener("mouseleave", () => {
                img.classList.remove("enlarge");
            });
        });

        function renderQuestionTiles() {
            const container = document.getElementById("question-tiles-container");
            container.innerHTML = ""; // Clear previous

            const currentCategory = categories[currentCategoryIndex];
            const questions = questionsByCategory[currentCategory];

            for (let i = 0; i < questions.length; i++) {
                const tile = document.createElement("div");
                tile.classList.add("question-tile");

                const qId = questions[i].id;
                const isAttempted = userResponses.hasOwnProperty(qId);
                const isCurrent = i === currentQuestionIndex;

                if (isCurrent) tile.classList.add("current");
                else if (isAttempted) tile.classList.add("attempted");
                else tile.classList.add("unattempted");

                tile.innerText = i + 1;

                // Jump to specific question on click (optional)
                tile.onclick = () => {
                    currentQuestionIndex = i;
                    loadQuestionById(qId);
                    renderQuestionTiles(); // Refresh highlight
                };

                container.appendChild(tile);
            }
        }
        function toggleDropdown() {
            var dropdown = document.getElementById("dropdownMenu");
            dropdown.style.display = (dropdown.style.display === "block") ? "none" : "block";
        }


        function selectOption(option) {
    if (isQuestionLoading || hasSubmitted) return;

    let questionId = document.getElementById("question-id").value;
    userResponses[questionId] = option;

    // Remove previous selections
    ["a", "b", "c", "d"].forEach(opt => {
        document.getElementById(`option-${opt}`).classList.remove("selected-option");
        document.getElementById(`option-${opt}-text`).classList.remove("selected-option");
    });

    // Highlight current selection
    document.getElementById(`option-${option.toLowerCase()}`).classList.add("selected-option");
    document.getElementById(`option-${option.toLowerCase()}-text`).classList.add("selected-option");

    const currentCategory = categories[currentCategoryIndex];
    const questions = questionsByCategory[currentCategory];
    const totalQuestions = questions.length;

    const unanswered = questions.filter(q => !(q.id in userResponses));

    // ✅ If that was the last unanswered question in the category
    if (unanswered.length === 0) {
        // 🔁 Submit this category's responses to backend
        submitCategoryResponses(currentCategory);

        if (currentCategoryIndex === categories.length - 1) {
            hasSubmitted = true;
            setTimeout(() => {
            window.location.href = '/programmes';
        }, 1000); 
        } else {
            showToast("All questions answered in this category! Moving to the next one...", "success");
            currentCategoryIndex++;
            currentQuestionIndex = 0;
            updateCategoryButtonsUI();
            showCategoryModal();
        }
        return;
    }

    // Move to next question
    currentQuestionIndex++;

    if (currentQuestionIndex >= totalQuestions) {
        showToast("You haven't answered all questions in this category.", "warning");
        currentQuestionIndex = questions.findIndex(q => !(q.id in userResponses));
    }

    loadNextQuestion();
    renderQuestionTiles();
}


function submitCategoryResponses(category) {
    const categoryQuestions = questionsByCategory[category];
    const categoryResponses = {};

    // Collect all responses for the category (even unanswered)
    categoryQuestions.forEach(q => {
        const selected = userResponses.hasOwnProperty(q.id) ? userResponses[q.id] : "0";
        categoryResponses[q.id] = selected;
    });

    authFetch('/submit_category_responses', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({
            category: category,
            responses: categoryResponses
        })
    })
    .then(response => response.json())
    .then(data => {
        console.log('✅ Backend responded:', data);
        // Trust backend completion flag instead of local JS count
        if (!data.success) {
            showToast("Error saving responses: " + data.message, "error");
        }
        if (data.complete === false) {
            console.warn(`⚠️ Category ${category} incomplete: answered ${data.answered}/${data.expected}`);
        }
    })
    .catch(error => console.error("Error submitting category responses:", error));
}


async function fetchQuestions() {
    try {
        // Step 1: Get last attempted category
        let lastCategory = null;
        const lastCategoryRes = await authFetch('/get_last_category');
        const lastCategoryData = await lastCategoryRes.json();

        console.log("🟡 Response from /get_last_category:", lastCategoryData);

        if (lastCategoryData.success && lastCategoryData.last_category) {
            lastCategory = lastCategoryData.last_category;
            console.log("✅ Last category set to:", lastCategory);
        }

        // Step 2: Fetch all questions
        const questionsRes = await authFetch('/aptitudegetquestion');
        const questionsData = await questionsRes.json();

        questionsByCategory = questionsData.questions_by_category;
        categories = Object.keys(questionsByCategory);

        // Sort categories by your custom order
        const customOrder = ['spellingmistake', 'ABSTRACT', 'NUMEBERS', 'Verbal', 'arithmetic', 'workingQA', 'SPATIAL'];
        categories.sort((a, b) => customOrder.indexOf(a) - customOrder.indexOf(b));

        // Step 3: Resume from the next category after last completed
        if (lastCategory && categories.includes(lastCategory)) {
            const lastIndex = categories.indexOf(lastCategory);
            if (lastIndex < categories.length - 1) {
                currentCategoryIndex = lastIndex + 1; // ✅ Resume from next category
            } else {
                currentCategoryIndex = categories.length - 1; // ✅ All done, stay at last
            }
        } else {
            currentCategoryIndex = 0; // 🟢 Start fresh
        }

        if (categories.length > 0) {
            showCategorySelection();
            showCategoryModal();
            renderQuestionTiles();
        } else {
            document.getElementById("question-text").innerText = "No questions available!";
        }

    } catch (error) {
        console.error("❌ Error in fetchQuestions:", error);
    }
}
