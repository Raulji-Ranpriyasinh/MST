<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/favicon.png">
    <title>Edgepsych Firm-Dashboard</title>
    <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Poppins', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8fbfd;
    }

    .navbar {
        padding: 10px;
        background-color: white;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 1px 6px rgba(0, 0, 0, 0.08);
        background-image: url('/static/nav-img1.png'), url('/static/nav-img2.png');
        background-repeat: no-repeat, no-repeat;
        background-size: contain, contain;
        background-position: center left, center right;
    }

    .logo img {
      height: 40px;
    }

    .profile-btn {
      background-color: #296eff;
      color: white;
      font-weight: 500;
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .profile-btn:hover {
      background-color: #1a5ad4;
    }

    .container {
      width: 90%;
      margin: 20px auto;
      padding: 20px;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #001e4d;
    }

    /* Stats Cards */
    .stats-row {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .stat-card {
      flex: 1;
      min-width: 200px;
      background: white;
      border-radius: 12px;
      border: 2px solid #5A8CE32E;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
      padding: 24px 20px;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.12);
    }

    .stat-card h3 {
      font-size: 14px;
      color: #666;
      margin: 0 0 8px 0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card .stat-value {
      font-size: 32px;
      font-weight: 600;
      color: #001e4d;
    }

    .stat-card .stat-value.warning {
      color: #dc3545;
    }

    .low-credit-banner {
      display: none;
      background: linear-gradient(135deg, #dc3545, #c82333);
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      text-align: center;
      font-weight: 500;
    }

    .low-credit-banner.visible {
      display: block;
    }

    /* Tabs */
    .tab-bar {
      display: flex;
      border-bottom: 2px solid #e0e0e0;
      margin-bottom: 20px;
    }

    .tab-btn {
      padding: 12px 24px;
      border: none;
      background: none;
      font-size: 15px;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      color: #666;
      font-weight: 500;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-btn:hover {
      color: #0864ed;
    }

    .tab-btn.active {
      color: #0864ed;
      border-bottom-color: #0864ed;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    th, td {
      padding: 12px 15px;
      text-align: left;
    }

    th {
      background-color: #0864ed;
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      font-size: 13px;
    }

    tr:nth-child(even) td {
      background-color: #f4f7fb;
    }

    tr:hover td {
      background-color: #eaf1fb;
    }

    td {
      font-size: 14px;
      color: #333;
      vertical-align: middle;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
      font-size: 15px;
    }

    /* Transaction type badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-purchase {
      background-color: #d4edda;
      color: #155724;
    }

    .badge-usage {
      background-color: #f8d7da;
      color: #721c24;
    }

    .badge-refund {
      background-color: #fff3cd;
      color: #856404;
    }

    .badge-adjustment {
      background-color: #d1ecf1;
      color: #0c5460;
    }

    /* Loading Spinner Overlay */
    .loading-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.7);
      z-index: 9999;
      justify-content: center;
      align-items: center;
    }
    .loading-overlay.active {
      display: flex;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 5px solid #e0e0e0;
      border-top: 5px solid #0864ed;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Search */
    .search-bar {
      margin-bottom: 15px;
    }

    .search-bar input {
      padding: 10px 14px;
      width: 300px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      font-family: 'Poppins', sans-serif;
    }

    /* Mobile Responsiveness */
    @media (max-width: 768px) {
      .navbar {
        background-size: auto 40px, auto 40px;
        background-position: left center, right center;
        padding: 8px 10px;
      }
      .logo img {
        height: 30px;
      }
      .profile-btn {
        padding: 6px 10px;
        font-size: 12px;
      }
      .stats-row {
        flex-direction: column;
      }
      .stat-card {
        min-width: unset;
      }
      .container {
        width: 100% !important;
        padding: 10px;
        overflow-x: auto;
      }
      table {
        min-width: 600px;
        font-size: 12px;
      }
      th, td {
        padding: 8px 6px;
        font-size: 12px;
      }
      .tab-btn {
        padding: 10px 14px;
        font-size: 13px;
      }
      .search-bar input {
        width: 100%;
        box-sizing: border-box;
      }
    }
    </style>
</head>

<body>

    <!-- Loading Spinner Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <div class="navbar">
        <div class="logo">
            <img src="/static/image-removebg edge.png" class="logo-icon" alt="logo" />
        </div>
        <div class="dropdown">
            <button onclick="firmLogout()" class="profile-btn">
                <span class="user-icon"><img src="/static/profile-icon.png" alt=""></span>
                <span style="color: white; text-decoration: none; font-weight: 100;">Logout</span>
            </button>
        </div>
    </div>

    <div class="container">
        <h2 id="firmTitle">Firm Dashboard</h2>

        <!-- Low Credit Warning Banner -->
        <div class="low-credit-banner" id="lowCreditBanner">
            Low credit balance! Please contact the administrator to add more credits.
        </div>

        <!-- Stats Cards -->
        <div class="stats-row">
            <div class="stat-card">
                <h3>Firm Name</h3>
                <div class="stat-value" id="firmName" style="font-size: 22px;">--</div>
            </div>
            <div class="stat-card">
                <h3>Credit Balance</h3>
                <div class="stat-value" id="creditBalance">--</div>
            </div>
            <div class="stat-card">
                <h3>Total Students</h3>
                <div class="stat-value" id="totalStudents">--</div>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('students')">Students</button>
            <button class="tab-btn" onclick="switchTab('transactions')">Credit Transactions</button>
        </div>

        <!-- Students Tab -->
        <div class="tab-content active" id="tab-students">
            <div class="search-bar">
                <input type="text" id="searchStudent" placeholder="Search by name or email..." onkeyup="filterStudents()" />
            </div>
            <table id="studentsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Email</th>
                    </tr>
                </thead>
                <tbody id="studentsBody">
                </tbody>
            </table>
            <div class="empty-state" id="noStudents" style="display:none;">No students linked to this firm yet.</div>
        </div>

        <!-- Transactions Tab -->
        <div class="tab-content" id="tab-transactions">
            <table id="transactionsTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Student ID</th>
                        <th>Credits</th>
                        <th>Type</th>
                        <th>Description</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody id="transactionsBody">
                </tbody>
            </table>
            <div class="empty-state" id="noTransactions" style="display:none;">No transactions recorded yet.</div>
        </div>
    </div>

    <script src="/static/js/jwt_helpers.js"></script>
    <script src="/static/js/toast.js"></script>
    <script>
        // ===== Tab Switching =====
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));

            document.getElementById('tab-' + tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'transactions') {
                loadTransactions();
            }
        }

        // ===== Load Dashboard Data =====
        async function loadDashboard() {
            document.getElementById('loadingOverlay').classList.add('active');
            try {
                const res = await authFetch('/api/v1/firm/dashboard-data');
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/firm';
                    return;
                }
                const data = await res.json();
                if (!data.success) {
                    showToast(data.message || 'Failed to load dashboard', 'error');
                    document.getElementById('loadingOverlay').classList.remove('active');
                    return;
                }

                // Update stats
                document.getElementById('firmName').textContent = data.firm_name;
                document.getElementById('creditBalance').textContent = data.credit_balance;
                document.getElementById('totalStudents').textContent = data.students.length;
                document.getElementById('firmTitle').textContent = data.firm_name + ' - Dashboard';

                // Low credit warning
                if (data.low_credit_warning) {
                    document.getElementById('lowCreditBanner').classList.add('visible');
                    document.getElementById('creditBalance').classList.add('warning');
                }

                // Populate students table
                const tbody = document.getElementById('studentsBody');
                tbody.innerHTML = '';

                if (data.students.length === 0) {
                    document.getElementById('studentsTable').style.display = 'none';
                    document.getElementById('noStudents').style.display = 'block';
                } else {
                    document.getElementById('studentsTable').style.display = '';
                    document.getElementById('noStudents').style.display = 'none';
                    data.students.forEach(s => {
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${s.id}</td>
                            <td>${escapeHtml(s.first_name)}</td>
                            <td>${escapeHtml(s.last_name)}</td>
                            <td>${escapeHtml(s.email)}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }

                document.getElementById('loadingOverlay').classList.remove('active');
            } catch (err) {
                console.error('Dashboard error:', err);
                showToast('Failed to load dashboard data.', 'error');
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        }

        // ===== Load Transactions =====
        let transactionsLoaded = false;
        async function loadTransactions() {
            if (transactionsLoaded) return;

            try {
                const res = await authFetch('/api/v1/firm/credits/transactions');
                if (res.status === 401 || res.status === 403) {
                    window.location.href = '/firm';
                    return;
                }
                const data = await res.json();
                if (!data.success) {
                    showToast(data.message || 'Failed to load transactions', 'error');
                    return;
                }

                const tbody = document.getElementById('transactionsBody');
                tbody.innerHTML = '';

                if (data.transactions.length === 0) {
                    document.getElementById('transactionsTable').style.display = 'none';
                    document.getElementById('noTransactions').style.display = 'block';
                } else {
                    document.getElementById('transactionsTable').style.display = '';
                    document.getElementById('noTransactions').style.display = 'none';
                    data.transactions.forEach(t => {
                        const row = document.createElement('tr');
                        const badgeClass = 'badge-' + (t.transaction_type || 'usage');
                        const dateStr = t.created_at ? new Date(t.created_at).toLocaleString() : '--';
                        row.innerHTML = `
                            <td>${t.id}</td>
                            <td>${t.student_id || '--'}</td>
                            <td>${t.credits_used}</td>
                            <td><span class="badge ${badgeClass}">${escapeHtml(t.transaction_type)}</span></td>
                            <td>${escapeHtml(t.description || '--')}</td>
                            <td>${dateStr}</td>
                        `;
                        tbody.appendChild(row);
                    });
                }

                transactionsLoaded = true;
            } catch (err) {
                console.error('Transactions error:', err);
                showToast('Failed to load transactions.', 'error');
            }
        }

        // ===== Filter Students =====
        function filterStudents() {
            const query = document.getElementById('searchStudent').value.toLowerCase();
            const rows = document.querySelectorAll('#studentsBody tr');
            rows.forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? '' : 'none';
            });
        }

        // ===== Logout =====
        function firmLogout() {
            authFetch('/api/v1/firm/logout', { method: 'GET' })
                .then(() => { window.location.href = '/firm'; })
                .catch(() => { window.location.href = '/firm'; });
        }

        // ===== Escape HTML =====
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(str));
            return div.innerHTML;
        }

        // ===== Init =====
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>

</body>
</html>
